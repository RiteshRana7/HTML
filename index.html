<!DOCTYPE html>
<html>
	<head>
		<title>Fome table</title>
	</head>
	<body>
	<center>
		<table bgcolor="aqua" border="1" width="700" cellpadding="10" cellspacing="0">
			<caption>
				<h1>Application Form</h1>
			</caption>
				<tr>
					<td>Full Name</td>
					<td>
						<input type="text" placeholder="Enter your full name"/>
					</td>
				</tr>
				
				<tr>
					<td>email</td>
					<td>
						<input type="email" placeholder="example@gmail.com"/>
					</td>
				</tr>
				
				<tr>
					<td>phon</td>
					<td>
						<input type="number" placeholder="111-435-3565"/>
					</td>
				</tr>
				
				<tr>
					<td>Gender</td>
					<td>
						<input type="radio" name="Gender"/>
						male
						<input type="radio" name="Gender"/>
						female
					</td>
				</tr>
				<tr>
					<td>Skills</td>
					<td>
						<input type="checkbox"/>
						HTML
						<input type="checkbox"/>
						CSS
						<input type="checkbox">
						JavaScript
					</td>
				</tr>
				<tr>
					<td>Salary</td>
					<td>
						<input type="range"/>
					</td>
				</tr>
				<tr>
					<td>Upload Resume</td>
					<td>
						<input type="file"/>
					</td>
				</tr>
				
				<tr>
					<td>COlor</td>
					<td>
						<input type="color"/>
					</td>
				</tr>
				
				<tr>
					<td>date</td>
					<td>
						<input type="Date"/>
					</td>
				</tr>
				<tr>
					<td>address</td>
					<td>
						<textarea rows="4" cols="50"></textarea>
					</td>
				</tr>
				<tr>
					<td colspan="2">
						<button>Submit</button>
						<button>reset</button>
					</td>
				</tr>
		</table>
	</center>
	</body>
</html>
