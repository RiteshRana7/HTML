<!DOCTYPE>
<html>
	<head>
		<title>Table</title>
	</head>
		<style>
			table{
			text-align:center;
			border-collapse:collapse;
			background-color:yellow;
			}
			table{
				height:60%;
				width:60%;
			}
			tr:hover{
				background-color:blue;
				color:white;
				font-size:25px;
			}
		</style>
	<body>
		<table border="1px">
				<tr>
					<th>Name</th>
					<th>Course</th>
					<th>Age</th>
				</tr>
				
				<tr>
					<td>Ritesh</td>
					<td>BCA</td>
					<td>20</td>
				</tr>
				<tr>
					<td>Rahul</td>
					<td>BA</td>
					<td>20</td>
				</tr>
				
				<tr>
					<td>Vishal</td>
					<td>BCA</td>
					<td>20</td>
				</tr>
		</table>
	</body>
</html>
