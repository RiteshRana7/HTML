<!DOCTYPE html>
<html>
	<head>
		<title>Form Table</title>
	</head>
	
	<body>
	<center>
		<table bgcolor="skyblue" width="600" border="1" cellpadding="10" cellspacing="0">
			<caption>
				<h1>Job Application Form</h1>
			</caption>
			<tr>
				<td bgcolor="green">Full Name</td>
				<td>
					<input type="text" placeholder="Enter your name"/>
				</td>
			</tr>
			<tr bgcolor="yellow">
				<td>Email</td>
				<td>
					<input type="email" placeholder="example@gmail.com"/>
				</td>
			</tr>
			<tr>
				<td>Phone</td>
				<td>
					<input type="number" placeholder="123-456-7890"/>
				</td>
			</tr>
			<tr>
				<td>Gender</td>
				<td>
					<input type="radio" name="gender"/>
					Male
					<input type="radio" name="gender"/>
					Female
				</td>
			</tr>
			<tr>
				<td>Skills</td>
				<td>
					<input type="checkbox"/>
					HTML
					<input type="checkbox"/>
					CSS
					<input type="checkbox"/>
					JavaScript
				</td>
			</tr>
			<tr>
				<td>Salary</td>
				<td>
					<input type="range"/>
				</td>
			</tr>
			<tr>
				<td>Upload Resume</td>
				<td>
					<input type="file"/>
				</td>
			</tr>
			<tr>
				<td>Color</td>
				<td>
					<input type="color"/>
				</td>
			</tr>
						<tr>
				<td>Date</td>
				<td>
					<input type="date"/>
				</td>
			</tr>
			<tr>
				<td>Address</td>
				<td>
					<textarea rows="4" cols="50"></textarea>
				</td>
			</tr>
			<tr>
				<td colspan="2">
					<center>
						<button>Submit</button>
						<button>Reset</button>
					</center>
				</td>
				
			</tr>
		</table>
	</center>
	</body>
</html>
